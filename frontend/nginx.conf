server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA: any path that isn't a real static file falls through to
    # index.html so client-side navigation (the Services/Incidents/Logs
    # tabs) works on a hard refresh too.
    location / {
        try_files $uri /index.html;
    }

    location = /health {
        proxy_pass http://backend:8000/health;
    }

    # SSE needs its own location block BEFORE the general /api/ block:
    # nginx buffers proxied responses by default, which silently breaks
    # Server-Sent Events -- the connection stays open but nothing arrives
    # until the buffer fills or the connection closes, i.e. "live updates"
    # quietly stop being live. proxy_buffering off (plus a long read
    # timeout, since this is a long-lived connection by design) fixes it.
    location = /api/events {
        proxy_pass http://backend:8000/api/events;
        proxy_http_version 1.1;
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 24h;
    }

    location /api/ {
        proxy_pass http://backend:8000/api/;
    }

    location /ingest/ {
        proxy_pass http://backend:8000/ingest/;
    }
}
