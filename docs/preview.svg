<svg viewBox="0 0 900 540" xmlns="http://www.w3.org/2000/svg" font-family="'Space Mono', ui-monospace, monospace">
  <defs>
    <style>
      .bg { fill: #0b0d10; }
      .panel { fill: #12161b; }
      .panel-raised { fill: #171c22; }
      .border { stroke: #232a31; stroke-width: 1; }
      .text { fill: #d4d8dc; }
      .text-dim { fill: #6b7580; }
      .text-faint { fill: #454e58; }
      .amber { fill: #ffa940; }
      .ok { fill: #3ddc84; }
      .crit { fill: #ff5a5a; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="900" height="540"/>

  <!-- topbar -->
  <rect class="panel" x="0" y="0" width="900" height="44"/>
  <line class="border" x1="0" y1="44" x2="900" y2="44"/>
  <text class="text" x="20" y="27" font-size="13" font-weight="700" letter-spacing="2">[ WATCHTOWER ]</text>
  <nav>
    <rect class="panel-raised" x="330" y="12" width="72" height="20" rx="3"/>
    <text class="amber" x="345" y="26" font-size="11">Services</text>
    <text class="text-dim" x="415" y="26" font-size="11">Incidents</text>
    <text class="text-dim" x="495" y="26" font-size="11">Logs</text>
  </nav>
  <circle class="ok" cx="820" cy="22" r="4"/>
  <text class="text-dim" x="832" y="26" font-size="11">LIVE</text>
  <text class="text-faint" x="770" y="26" font-size="11" text-anchor="end">14:32:07</text>

  <!-- service list pane -->
  <rect class="panel" x="0" y="44" width="230" height="496"/>
  <line class="border" x1="230" y1="44" x2="230" y2="540"/>
  <text class="text-faint" x="16" y="68" font-size="10" letter-spacing="1.5">SERVICES · 4</text>

  <!-- row: healthy-svc, selected -->
  <rect class="panel-raised" x="0" y="80" width="230" height="34"/>
  <rect class="amber" x="0" y="80" width="2" height="34"/>
  <circle class="ok" cx="20" cy="97" r="4"/>
  <text class="text" x="34" y="101" font-size="12">healthy-svc</text>
  <text class="text-faint" x="200" y="101" font-size="9" text-anchor="end">http</text>

  <!-- row: flaky-svc, critical -->
  <circle class="crit" cx="20" cy="131" r="4"/>
  <text class="text" x="34" y="135" font-size="12">flaky-svc</text>
  <text class="text-faint" x="190" y="135" font-size="9" text-anchor="end">http</text>
  <circle class="crit" cx="212" cy="131" r="7"/>
  <text x="212" y="134" font-size="9" text-anchor="middle" fill="#0b0d10" font-weight="700">2</text>

  <!-- row: payments-api-logs -->
  <circle class="ok" cx="20" cy="165" r="4"/>
  <text class="text" x="34" y="169" font-size="12">payments-api-logs</text>
  <text class="text-faint" x="200" y="169" font-size="9" text-anchor="end">log</text>

  <!-- row: checkout-api -->
  <circle class="ok" cx="20" cy="199" r="4"/>
  <text class="text" x="34" y="203" font-size="12">checkout-api</text>
  <text class="text-faint" x="200" y="203" font-size="9" text-anchor="end">http</text>

  <line class="border" x1="0" y1="114" x2="230" y2="114"/>
  <line class="border" x1="0" y1="148" x2="230" y2="148"/>
  <line class="border" x1="0" y1="182" x2="230" y2="182"/>
  <line class="border" x1="0" y1="216" x2="230" y2="216"/>

  <!-- detail pane -->
  <text class="text" x="254" y="90" font-size="18" font-weight="700">healthy-svc</text>
  <rect fill="none" stroke="#3ddc84" x="356" y="76" width="34" height="16" rx="3"/>
  <text class="ok" x="373" y="88" font-size="10" text-anchor="middle">OK</text>
  <text class="text-dim" x="254" y="112" font-size="11">type: http · last check: 14:31:58 · open incidents: 0</text>

  <!-- stat row -->
  <text class="text-faint" x="254" y="146" font-size="9" letter-spacing="1">LAST LATENCY</text>
  <text class="text" x="254" y="166" font-size="18" font-weight="700">82ms</text>
  <text class="text-faint" x="380" y="146" font-size="9" letter-spacing="1">BASELINE MEAN</text>
  <text class="text" x="380" y="166" font-size="18" font-weight="700">79ms</text>
  <text class="text-faint" x="520" y="146" font-size="9" letter-spacing="1">BASELINE STDDEV</text>
  <text class="text" x="520" y="166" font-size="18" font-weight="700">±6ms</text>
  <text class="text-faint" x="660" y="146" font-size="9" letter-spacing="1">ERROR RATE</text>
  <text class="ok" x="660" y="166" font-size="18" font-weight="700">0.0%</text>

  <!-- chart panel -->
  <rect class="panel" x="254" y="190" width="620" height="220" rx="3"/>
  <rect class="border" fill="none" x="254" y="190" width="620" height="220" rx="3"/>
  <text class="text-dim" x="270" y="212" font-size="10" letter-spacing="1">LATENCY — LAST 500 CHECKS</text>

  <!-- baseline band -->
  <rect fill="#ffa940" opacity="0.08" x="270" y="300" width="580" height="40"/>
  <line x1="270" y1="320" x2="850" y2="320" stroke="#a86f2c" stroke-width="1" stroke-dasharray="3 3"/>

  <!-- chart line -->
  <polyline fill="none" stroke="#3ddc84" stroke-width="1.5"
    points="270,325 300,315 330,330 360,310 390,322 420,318 450,308 480,325 510,312 540,320 570,315 600,322 630,310 660,318 690,325 720,314 750,320 780,312 810,318 850,316"/>

  <!-- one failed check marker (spike = higher latency = smaller y) -->
  <circle class="crit" cx="630" cy="295" r="3"/>

  <!-- y axis -->
  <text class="text-faint" x="264" y="300" font-size="8" text-anchor="end">150</text>
  <text class="text-faint" x="264" y="365" font-size="8" text-anchor="end">75</text>
  <text class="text-faint" x="264" y="395" font-size="8" text-anchor="end">0</text>

  <!-- legend -->
  <rect class="ok" x="270" y="425" width="10" height="2"/>
  <text class="text-dim" x="285" y="430" font-size="9">latency</text>
  <rect fill="#a86f2c" x="350" y="425" width="10" height="2"/>
  <text class="text-dim" x="365" y="430" font-size="9">baseline mean ± stddev</text>
  <circle class="crit" cx="545" cy="426" r="3"/>
  <text class="text-dim" x="555" y="430" font-size="9">failed check</text>

  <text class="text-faint" x="884" y="530" font-size="9" text-anchor="end" font-style="italic">
    illustrative mockup — not a live screenshot
  </text>
</svg>
